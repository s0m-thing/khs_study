<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취준생을 위한 통합 워크스페이스</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; 
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .block-placeholder:empty:before {
            content: attr(data-placeholder);
            color: #9ca3af;
            cursor: text;
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. Sidebar Component ---
        const Sidebar = () => (
            <div className="w-64 h-screen bg-[#f7f7f5] flex flex-col border-r border-gray-200 text-[#37352f] text-sm shrink-0 hover:overflow-y-auto hide-scrollbar transition-all z-20">
                <div className="flex items-center p-3 hover:bg-gray-200 cursor-pointer transition-colors m-1 rounded mt-2">
                    <div className="w-5 h-5 bg-blue-500 rounded flex items-center justify-center text-white font-bold text-xs mr-2">W</div>
                    <span className="font-semibold truncate">취준생 워크스페이스</span>
                </div>

                <div className="px-3 mb-4 space-y-0.5 mt-2">
                    <div className="flex items-center p-1.5 hover:bg-gray-200 cursor-pointer rounded text-gray-600">
                        <i data-lucide="search" className="w-4 h-4 mr-2"></i> 검색
                    </div>
                    <div className="flex items-center p-1.5 hover:bg-gray-200 cursor-pointer rounded text-gray-600">
                        <i data-lucide="clock" className="w-4 h-4 mr-2"></i> 업데이트
                    </div>
                </div>

                <div className="px-3">
                    <div className="text-xs font-semibold text-gray-500 mb-1 px-1 flex justify-between items-center group">
                        개인 페이지
                        <i data-lucide="plus" className="w-3 h-3 opacity-0 group-hover:opacity-100 cursor-pointer"></i>
                    </div>
                    <div className="flex items-center p-1.5 bg-gray-200 cursor-pointer rounded font-medium">
                        <span className="mr-2">🎯</span> 2026 하반기 취업 준비
                    </div>
                    <div className="flex items-center p-1.5 hover:bg-gray-200 cursor-pointer rounded text-gray-600">
                        <span className="mr-2">📝</span> 자기소개서 초안 모음
                    </div>
                    <div className="flex items-center p-1.5 hover:bg-gray-200 cursor-pointer rounded text-gray-600">
                        <span className="mr-2">💡</span> 면접 기출 질문 정리
                    </div>
                </div>
            </div>
        );

        // --- 2. Kanban Board Component ---
        const KanbanBoard = ({ openModal }) => {
            const columns = [
                {
                    id: 'todo',
                    title: '시작 전 (To Do)',
                    badgeColor: 'bg-gray-400',
                    tasks: [
                        { id: 1, company: "B기업", type: "코딩 테스트", dDay: 5, timeLeft: "5일", isUrgent: false, progress: 0 }
                    ]
                },
                {
                    id: 'inProgress',
                    title: '진행 중 (In Progress)',
                    badgeColor: 'bg-blue-500',
                    tasks: [
                        { id: 2, company: "A네트웍스", type: "사전 과제", dDay: 1, timeLeft: "14시간 30분", isUrgent: true, progress: 85 }
                    ]
                },
                {
                    id: 'done',
                    title: '완료 (Done)',
                    badgeColor: 'bg-green-500',
                    tasks: [
                        { id: 3, company: "C솔루션즈", type: "서류 제출", dDay: 0, timeLeft: "제출완료", isUrgent: false, progress: 100 }
                    ]
                }
            ];

            return (
                <div className="mt-12 border-t border-gray-100 pt-6">
                    <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                        <i data-lucide="kanban-square" className="w-5 h-5 mr-2 text-gray-500"></i>
                        과제 및 일정 트래커
                    </h2>
                    <div className="flex space-x-4 overflow-x-auto pb-4 hide-scrollbar">
                        {columns.map(col => (
                            <div key={col.id} className="flex-1 bg-gray-50/50 border border-gray-100 rounded-lg p-3 shrink-0 min-w-[280px] shadow-sm">
                                <div className="flex items-center mb-3">
                                    <span className={`w-2 h-2 rounded-full ${col.badgeColor} mr-2`}></span>
                                    <h3 className="font-semibold text-gray-700 text-sm">{col.title}</h3>
                                    <span className="ml-2 text-xs text-gray-400 bg-gray-100 px-1.5 rounded">{col.tasks.length}</span>
                                </div>
                                <div className="space-y-3">
                                    {col.tasks.map(task => (
                                        <div key={task.id} className={`p-4 bg-white border rounded-xl shadow-sm transition-all hover:shadow-md ${task.isUrgent ? 'border-orange-200' : 'border-gray-200'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${task.isUrgent ? 'bg-orange-100 text-orange-600' : 'bg-blue-50 text-blue-600'}`}>
                                                        {task.progress === 100 ? '🎉 완료' : `D-${task.dDay}`}
                                                    </span>
                                                    <h4 className="font-bold text-gray-800 mt-2">{task.company}</h4>
                                                    <p className="text-xs text-gray-500">{task.type}</p>
                                                </div>
                                            </div>
                                            
                                            {/* Progress Bar */}
                                            <div className="w-full bg-gray-100 rounded-full h-1.5 mb-2 mt-3">
                                                <div className={`h-1.5 rounded-full ${task.progress === 100 ? 'bg-green-500' : (task.isUrgent ? 'bg-orange-400' : 'bg-blue-400')}`} style={{ width: `${task.progress}%` }}></div>
                                            </div>
                                            
                                            <p className="text-xs text-gray-500 mb-3">
                                                {task.progress === 100 ? '마감일 이전에 안전하게 제출했어요.' : <span>마감까지 <strong className={task.isUrgent ? 'text-orange-500' : 'text-blue-500'}>{task.timeLeft}</strong> 남음</span>}
                                            </p>

                                            {task.progress !== 100 && (
                                                <button 
                                                    onClick={() => openModal(task)}
                                                    className={`w-full py-2 rounded-lg text-xs font-bold transition-colors ${task.isUrgent ? 'bg-orange-50 text-orange-600 hover:bg-orange-100' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}
                                                >
                                                    최종 제출하기
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                    <div className="text-gray-400 text-sm hover:bg-gray-200 p-1.5 rounded cursor-pointer flex items-center transition-colors">
                                        <i data-lucide="plus" className="w-3.5 h-3.5 mr-1"></i> 새로 만들기
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 3. Main Application & Editor Area ---
        const App = () => {
            // Checklist State
            const [tasks, setTasks] = useState([
                { id: 1, text: "A기업 사전과제 오타 3회 이상 검독하기", done: false },
                { id: 2, text: "제출용 포트폴리오 PDF 변환 및 용량(50MB 이하) 확인", done: true },
                { id: 3, text: "B기업 코딩테스트 플랫폼 환경 세팅 점검", done: false }
            ]);

            // Modal State
            const [modalOpen, setModalOpen] = useState(false);
            const [selectedTask, setSelectedTask] = useState(null);
            const [isAgreed, setIsAgreed] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            });

            const toggleTask = (id) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
            };

            const openModal = (task) => {
                setSelectedTask(task);
                setModalOpen(true);
                setIsAgreed(false);
                setIsSubmitted(false);
            };

            const handleFinalSubmit = () => {
                setIsSubmitted(true);
                setTimeout(() => setModalOpen(false), 3500); // Close after showing success message
            };

            const completedCount = tasks.filter(t => t.done).length;
            const isAllDone = completedCount === tasks.length;

            return (
                <div className="flex w-full h-screen selection:bg-blue-200 relative">
                    <Sidebar />
                    
                    {/* Main Editor */}
                    <div className="flex-1 flex flex-col h-screen overflow-y-auto relative bg-white">
                        {/* Top Navigation */}
                        <div className="h-12 flex items-center justify-between px-4 sticky top-0 bg-white/90 backdrop-blur-sm z-10 border-b border-gray-100">
                            <div className="flex items-center text-sm text-gray-600">
                                <span className="hover:bg-gray-100 p-1 rounded cursor-pointer">취준생 워크스페이스</span>
                                <span className="mx-1 text-gray-400">/</span>
                                <span className="flex items-center hover:bg-gray-100 p-1 rounded cursor-pointer font-medium text-gray-800">
                                    🎯 2026 하반기 취업 준비
                                </span>
                            </div>
                            <div className="flex items-center space-x-2 text-sm text-gray-500">
                                <span>편집됨 방금 전</span>
                                <button className="hover:bg-gray-100 px-2 py-1 rounded">공유</button>
                                <button className="hover:bg-gray-100 p-1 rounded"><i data-lucide="more-horizontal" className="w-4 h-4"></i></button>
                            </div>
                        </div>

                        {/* Content Area */}
                        <div className="max-w-4xl w-full mx-auto px-12 pb-32 pt-8">
                            <div className="text-6xl mb-4 w-fit p-2 hover:bg-gray-100 rounded-lg cursor-pointer -ml-2 transition-colors">
                                🎯
                            </div>
                            <h1 className="text-4xl font-bold text-[#37352f] outline-none block-placeholder placeholder-gray-300 mb-6" contentEditable="true" suppressContentEditableWarning={true} data-placeholder="제목 없음">
                                2026 하반기 취업 준비 보드
                            </h1>
                            
                            <p className="outline-none block-placeholder leading-relaxed text-[#37352f] mb-8" contentEditable="true" suppressContentEditableWarning={true} data-placeholder="'/'를 입력해 명령어를 확인하세요.">
                                인지적 과부하를 줄이고 멘탈을 관리하기 위한 통합 워크스페이스입니다. <strong>작은 성취(마이크로 스텝)</strong>를 쌓아가며 마감일을 안전하게 관리해 보세요.
                            </p>

                            {/* Micro-step Checklist Area */}
                            <div className="bg-gray-50/50 border border-gray-100 p-6 rounded-xl mb-8">
                                <div className="flex justify-between items-end mb-4">
                                    <div>
                                        <h3 className="font-bold text-gray-800 flex items-center">
                                            <i data-lucide="check-circle" className="w-5 h-5 mr-2 text-blue-500"></i>
                                            오늘의 집중 체크리스트
                                        </h3>
                                        <p className="text-xs text-gray-500 mt-1">거대한 태스크를 작게 쪼개어 하나씩 달성해 봐요.</p>
                                    </div>
                                    <span className="text-sm font-bold text-blue-600 bg-blue-100 px-3 py-1 rounded-full">
                                        {completedCount} / {tasks.length} 완료
                                    </span>
                                </div>

                                <div className="space-y-2">
                                    {tasks.map(task => (
                                        <div key={task.id} onClick={() => toggleTask(task.id)} className={`flex items-center p-3 rounded-lg cursor-pointer transition-all duration-300 ${task.done ? 'opacity-50 bg-transparent' : 'bg-white shadow-sm border border-gray-100 hover:border-blue-300'}`}>
                                            <div className={`w-5 h-5 rounded border-2 flex items-center justify-center mr-3 transition-colors ${task.done ? 'bg-blue-500 border-blue-500' : 'border-gray-300'}`}>
                                                {task.done && <i data-lucide="check" className="w-3 h-3 text-white"></i>}
                                            </div>
                                            <p className={`text-sm outline-none w-full ${task.done ? 'line-through text-gray-500' : 'text-gray-800'}`} contentEditable={!task.done} suppressContentEditableWarning={true}>
                                                {task.text}
                                            </p>
                                        </div>
                                    ))}
                                </div>

                                {/* UX Writing: 응원 메시지 */}
                                {isAllDone && (
                                    <div className="mt-4 p-3 bg-blue-50 rounded-lg flex items-center text-blue-700 text-sm font-medium fade-in border border-blue-100">
                                        🎉 완벽해요! 오늘 계획한 목표를 모두 해냈어요. 조금씩 채워지는 체크리스트만큼, 합격에 한 걸음 더 가까워졌습니다.
                                    </div>
                                )}
                            </div>

                            {/* Kanban Board Area */}
                            <KanbanBoard openModal={openModal} />

                        </div>
                    </div>

                    {/* --- 4. Intentional Friction Submission Modal --- */}
                    {modalOpen && (
                        <div className="absolute inset-0 bg-black/50 z-50 flex items-center justify-center fade-in backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-2xl p-8 shadow-2xl m-4">
                                {!isSubmitted ? (
                                    <>
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-bold text-gray-800">과제 최종 제출</h3>
                                            <button onClick={() => setModalOpen(false)} className="p-1 hover:bg-gray-100 rounded-full"><i data-lucide="x" className="w-5 h-5 text-gray-500"></i></button>
                                        </div>
                                        
                                        <div className="bg-orange-50 text-orange-800 p-3 rounded-lg border border-orange-100 text-sm mb-6 flex items-start">
                                            <span className="mr-2">💡</span>
                                            <p>거의 다 왔어요! 담당자가 열어볼 파일이 맞는지 마지막으로 꼼꼼히 확인해 볼까요?</p>
                                        </div>

                                        <div className="bg-gray-50 p-4 rounded-xl mb-6 border border-gray-200">
                                            <p className="text-xs text-gray-500 mb-2">업로드된 최종 파일</p>
                                            <div className="flex items-center text-gray-800 font-semibold bg-white p-3 rounded border border-gray-100 shadow-sm">
                                                <i data-lucide="file-check-2" className="w-5 h-5 mr-2 text-blue-500"></i>
                                                {selectedTask?.company}_{selectedTask?.type}_최종본.pdf
                                            </div>
                                            <button className="mt-3 text-sm text-blue-600 font-medium hover:underline flex items-center">
                                                <i data-lucide="eye" className="w-4 h-4 mr-1"></i> 담당자가 볼 화면 미리보기 (필수 권장)
                                            </button>
                                        </div>

                                        <label className="flex items-start cursor-pointer mb-8 p-3 rounded-lg hover:bg-gray-50 transition-colors border border-transparent hover:border-gray-200">
                                            <input type="checkbox" className="mt-1 w-5 h-5 accent-blue-600 rounded border-gray-300 cursor-pointer" checked={isAgreed} onChange={(e) => setIsAgreed(e.target.checked)} />
                                            <span className="ml-3 text-sm text-gray-700 font-medium leading-relaxed">
                                                (필수) 제출 후에는 절대 수정이 불가합니다.<br/>오타 및 파일 깨짐이 없는지 최종 확인했습니다.
                                            </span>
                                        </label>

                                        <button onClick={handleFinalSubmit} disabled={!isAgreed} className={`w-full py-3.5 rounded-xl font-bold text-white text-lg transition-all duration-300 ${isAgreed ? 'bg-gray-800 hover:bg-black shadow-lg transform active:scale-[0.98]' : 'bg-gray-300 cursor-not-allowed'}`}>
                                            안전하게 최종 제출하기
                                        </button>
                                    </>
                                ) : (
                                    <div className="py-12 flex flex-col items-center text-center fade-in">
                                        <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
                                            <i data-lucide="check-circle" className="w-10 h-10 text-green-600"></i>
                                        </div>
                                        <h3 className="text-2xl font-bold text-gray-800 mb-3">제출이 완벽하게 끝났어요!</h3>
                                        <p className="text-base text-gray-600 leading-relaxed">
                                            제출하신 과제는 안전하게 암호화되어 보관됩니다.<br/>오늘 하루도 정말 고생 많으셨습니다.<br/>이제 무거운 짐은 내려놓고 푹 쉬세요! ☕
                                        </p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
